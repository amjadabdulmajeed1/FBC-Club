<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="FBC Club is one of the oldest and best-known football clubs in world. Would you like to become a member of FBC Club? Sign In!">
  <link rel="stylesheet" href="style.css">
  <title>FBC Club</title>
</head>

<body>

  <header>
    <!-- Navbar -->
    <!-- Header Section:
      - I added two items logo and navbar
      - I used Flexbox to style navbar
     -->
    <div class="nav">
      <a href="#" class="logo"><span class="nav-text"><i class="fa-regular fa-futbol"></i> FBC</span> Club</a>
      <nav>
        <ul class="nav-list">
          <li><a href="#home" class="active">Home</a></li>
          <li><a href="#news">News</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="#teams">Teams</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>

    <!-- Hero -->
    <!-- 
    Hero Section:
      - i added two items in this section (image and content)
      - use Flexbox to align items in column 
      - I used overly to add a little dark on the image. we can do that also in Photoshop.
     -->
    <section class="hero">
      <div class="hero-img">
        <figure class="hero-figure">
          <img src="./images/hero/showcase.jpg" alt="Header" class="header-image" loading="lazy">
        </figure>
      </div>
      <div class="hero-content">
        <h1 class="hero-content-title">Welcome to the largest Football club in the world</h1>
        <button class="hero-content-button">Leave your details</button>
      </div>
    </section>
  </main>

</body>

</html>
